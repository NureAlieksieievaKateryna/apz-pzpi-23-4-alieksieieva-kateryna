<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscription Status</title>

    <style>
        body {
            background: linear-gradient(135deg, #a8edea, #d0f4de, #e0d4f7);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .page {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
        }

        .box {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        h1 {
            color: #05445E;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            width: 70%;
        }

        button {
            background: #05445E;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        pre {
            background: white;
            padding: 15px;
            border-radius: 12px;
            overflow: auto;
        }
    </style>
</head>

<body>

<div class="page">

    <div class="box">
        <h1>Subscription Status</h1>
        <button onclick="location.href='user_home.html'">Back</button>
    </div>

    <div class="box">
        <input id="subscriptionId" type="number" placeholder="User Subscription ID">
        <button onclick="loadStatus()">Check</button>

        <pre id="result"></pre>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080";

    async function loadStatus() {
        const id = document.getElementById("subscriptionId").value;
        const result = document.getElementById("result");

        if (!id) {
            alert("Enter subscription ID");
            return;
        }

        result.innerText = "Loading...";

        try {
            const response = await fetch(`${BASE_URL}/subscriptions/user/status/${id}`);

            if (!response.ok) {
                throw new Error("Cannot load status");
            }

            const data = await response.json();
            result.innerText = JSON.stringify(data, null, 2);

        } catch (e) {
            result.innerText = "Server unavailable";
        }
    }
</script>

</body>
</html>
