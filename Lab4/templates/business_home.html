<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Home</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #a8edea, #d0f4de, #e0d4f7);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .home {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        .header, .card, .section {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1, h2, h3 {
            color: #05445E;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.55);
        }

        .card i {
            font-size: 38px;
            color: #05445E;
        }

        .section {
            margin-top: 25px;
        }

        input, textarea {
            width: 90%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            background: #05445E;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="home">

    <div class="header">
        <div>
            <h1>Business Home</h1>
            <p>Manage your subscription templates</p>
        </div>

        <button onclick="logout()">Logout</button>
    </div>

    <div class="cards">

        <div class="card">
            <i class="ri-add-circle-line"></i>
            <h3>Create Template</h3>
            <p>Create a subscription offer.</p>
        </div>

        <div class="card">
            <i class="ri-file-list-3-line"></i>
            <h3>My Templates</h3>
            <p>View business templates.</p>
        </div>

        <div class="card">
            <i class="ri-group-line"></i>
            <h3>Clients</h3>
            <p>View subscribed users.</p>
        </div>

        <div class="card">
            <i class="ri-bar-chart-line"></i>
            <h3>Analytics</h3>
            <p>Check subscription activity.</p>
        </div>

    </div>

    <div class="section">
        <h2>Create Subscription Template</h2>

        <input id="templateName" type="text" placeholder="Template name">
        <textarea id="templateDescription" placeholder="Description"></textarea>
        <input id="templatePrice" type="number" placeholder="Price">
        <input id="durationDays" type="number" placeholder="Duration days">

        <button onclick="createTemplate()">Create Template</button>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080";

    async function createTemplate() {
        const body = {
            name: document.getElementById("templateName").value,
            description: document.getElementById("templateDescription").value,
            price: Number(document.getElementById("templatePrice").value),
            durationDays: Number(document.getElementById("durationDays").value)
        };

        try {
            const response = await fetch(`${BASE_URL}/subscriptions/business/templates`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            if (response.ok) {
                alert("Template created");
            } else {
                const error = await response.text();
                alert(error);
            }

        } catch (e) {
            alert("Server unavailable");
        }
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
