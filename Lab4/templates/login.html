<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <style>

        body {
            background: linear-gradient(135deg, #a8edea, #d0f4de, #e0d4f7);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .login__container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            width: 650px;
            border-radius: 15px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .login__swapper {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 1.2rem;
        }

        .login__area {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login__data {
            text-align: center;
            margin-bottom: 1rem;
            color: #05445E;
        }

        .login__title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login__description {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .login__form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login_box {
            position: relative;
        }

        .login__input {
            width: 80%;
            padding: 0.75rem 2.5rem 0.75rem 0.75rem;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
        }

        .login_button,
        .login_button_border {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            border: none;
            font-size: 1rem;
        }

        .login_button {
            background-color: #05445E;
            color: white;
        }

        .login_button:hover {
            background-color: #189AB4;
        }

        .login_button_border {
            display: flex;
            justify-content: center;
            align-items: center;
            column-gap: 0.5rem;
            background-color: white;
            border: 2px solid #05445E;
            color: #05445E;
        }

        .login_button_border i {
            font-size: 1.5rem;
        }

        .login_button_border:hover {
            background-color: #189AB4;
            color: white;
        }

        .login__line {
            display: flex;
            align-items: center;
            text-align: center;
            color: gray;
            margin: 1.5rem 0;
        }

        .login__line::before,
        .login__line::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: gray;
        }


        .login__line::before {
            margin-right: 1rem;
        }

        .login__line::after {
            margin-left: 1rem;
        }

        .login__forget {
            text-decoration: none;
            color: #05445E;
            font-size: 0.9rem;
            align-self: flex-end;
        }

        .login__forget:hover {
            text-decoration: underline;
        }

        .login__switch {
            text-align: center;
            margin-top: 1rem;
        }

        .login__switch a {
            text-decoration: none;
            color: #189AB4;
        }

        .login__switch a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="login container grid">
    <div class="login__container grid">
        <div class="login__swapper">

        </div>

        <div class="login__area grid">
            <div class="login__data">
                <h1 class="login__title">Welcome Back</h1>
                <p class="login__description">Please enter your details</p>

                <button class="login_button_border">
                    <i class="ri-google-fill"></i> Log in with Google
                </button>
            </div>

            <span class="login__line">or</span>

            <form action="" class="login__form">
                <div class="login_content grid">
                    <div class="login_box">
                        <input type="text" name="login" placeholder="Login"
                               required class="login__input">
                        <i class="ri-mail-ai-line"></i>
                    </div>
                    <div class="login_box">
                        <input type="password" name="password" placeholder="Password"
                               required class="login__input" id="loginPassword">
                        <i class="ri-eye-close-line login__eye" id="loginEye"></i>
                    </div>
                </div>
                <a href="#" class="login__forget">Forget Password?</a>
                <button type="submit" class="login_button">Log in</button>
            </form>

            <p class="login__switch">Don't have any account
                <a href="register.html">

                    Sign up

                </a>
        </div>
    </div>
</div>

</body>

<script>

    document.addEventListener("DOMContentLoaded", () => {

        const form = document.querySelector(".login__form");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const login = form.querySelector("input[name='login']").value;
            const password = form.querySelector("input[name='password']").value;

            try {

                const response = await fetch(
                    "http://localhost:8080/client/login",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            login: login,
                            password: password
                        })
                    }
                );

                if (response.ok) {

                    const data = await response.json();


                    localStorage.setItem("token", data.token);

                    alert("✅ Login successful");

                    if(data.role === 'CLIENT'){
                        window.location.href = "user_home.html";
                    }

                    if (data.role === 'BUSINESS') {
                        window.location.href = "business_home.html";
                    }

                    window.location.href = "user_home.html";

                } else {

                    const err = await response.text();

                    alert("❌ Login failed: " + err);

                }

            } catch (error) {

                console.error(error);

                alert("⚠️ Server unavailable");

            }

        });

    });

</script>
</html>
