<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Home</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #a8edea, #d0f4de, #e0d4f7);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .home {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px;
        }

        .header, .section, .card {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1, h2, h3 {
            color: #05445E;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            background: #05445E;
            color: white;
            border: none;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #189AB4;
        }

        .lang-btn {
            background: white;
            color: #05445E;
            border: 1px solid #05445E;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            padding: 25px;
        }

        .card i {
            font-size: 38px;
            color: #05445E;
        }

        .section {
            margin-top: 25px;
            padding: 25px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .item {
            background: white;
            border-radius: 14px;
            padding: 15px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            align-items: center;
        }

        .item small {
            color: #555;
        }

        .badge {
            display: inline-block;
            background: #d0f4de;
            color: #05445E;
            padding: 4px 8px;
            border-radius: 8px;
            margin-top: 6px;
            font-size: 12px;
        }

        @media (max-width: 850px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .header, .search-row, .item {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>

<div class="home">

    <div class="header">
        <div>
            <h1 data-i18n="title">User Home</h1>
            <p data-i18n="subtitle">Welcome to FlexiSubs</p>
        </div>

        <div class="actions">
            <button class="lang-btn" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('ua')">UA</button>
            <button onclick="logout()" data-i18n="logout">Logout</button>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <i class="ri-bank-card-line"></i>
            <h3 data-i18n="mySubscriptions">My Subscriptions</h3>
            <p data-i18n="mySubscriptionsText">View active subscriptions.</p>
        </div>

        <div class="card">
            <i class="ri-store-2-line"></i>
            <h3 data-i18n="explore">Explore Offers</h3>
            <p data-i18n="exploreText">Search business templates.</p>
        </div>

        <div class="card">
            <i class="ri-information-line"></i>
            <h3 data-i18n="status">Status</h3>
            <p data-i18n="statusText">Check subscription status.</p>
        </div>
    </div>

    <div class="section">
        <h2 data-i18n="templates">Available Templates</h2>

        <div class="search-row">
            <input id="searchInput" type="text" placeholder="Search by business, name, type..." oninput="renderTemplates()">
            <button onclick="loadTemplates()" data-i18n="refresh">Refresh</button>
        </div>

        <div id="templatesContainer">Loading...</div>
    </div>

    <div class="section">
        <h2 data-i18n="activeSubscriptions">My Active Subscriptions</h2>

        <div class="search-row">
            <input id="userIdInput" type="number" placeholder="User ID">
            <button onclick="loadActiveSubscriptions()" data-i18n="loadActive">Load Active</button>
        </div>

        <div id="activeContainer"></div>
    </div>

</div>

<script>
    const BASE_URL = "http://localhost:8080";

    let templates = [];
    let currentLang = localStorage.getItem("lang") || "en";

    const translations = {
        en: {
            title: "User Home",
            subtitle: "Welcome to FlexiSubs",
            logout: "Logout",
            mySubscriptions: "My Subscriptions",
            mySubscriptionsText: "View active subscriptions.",
            explore: "Explore Offers",
            exploreText: "Search business templates.",
            status: "Status",
            statusText: "Check subscription status.",
            templates: "Available Templates",
            refresh: "Refresh",
            activeSubscriptions: "My Active Subscriptions",
            loadActive: "Load Active",
            subscribe: "Subscribe",
            statusButton: "Status",
            noTemplates: "No templates found",
            noActive: "No active subscriptions found",
            serverError: "Cannot connect to server"
        },
        ua: {
            title: "Головна сторінка користувача",
            subtitle: "Ласкаво просимо до FlexiSubs",
            logout: "Вийти",
            mySubscriptions: "Мої підписки",
            mySubscriptionsText: "Перегляд активних підписок.",
            explore: "Пошук пропозицій",
            exploreText: "Шукайте шаблони бізнесів.",
            status: "Статус",
            statusText: "Перевірка статусу підписки.",
            templates: "Доступні шаблони",
            refresh: "Оновити",
            activeSubscriptions: "Мої активні підписки",
            loadActive: "Завантажити активні",
            subscribe: "Підписатися",
            statusButton: "Статус",
            noTemplates: "Шаблони не знайдено",
            noActive: "Активні підписки не знайдено",
            serverError: "Немає з'єднання з сервером"
        }
    };

    document.addEventListener("DOMContentLoaded", () => {
        applyLanguage();
        loadTemplates();

        const savedUserId = localStorage.getItem("userId");
        if (savedUserId) {
            document.getElementById("userIdInput").value = savedUserId;
            loadActiveSubscriptions();
        }
    });

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("lang", lang);
        applyLanguage();
        renderTemplates();
    }

    function t(key) {
        return translations[currentLang][key];
    }

    function applyLanguage() {
        document.querySelectorAll("[data-i18n]").forEach(el => {
            el.innerText = t(el.dataset.i18n);
        });

        document.getElementById("searchInput").placeholder =
            currentLang === "en"
                ? "Search by business, name, type..."
                : "Пошук за бізнесом, назвою, типом...";

        document.getElementById("userIdInput").placeholder =
            currentLang === "en"
                ? "User ID"
                : "ID користувача";
    }

    async function loadTemplates() {
        const container = document.getElementById("templatesContainer");
        container.innerHTML = "Loading...";

        try {
            const response = await fetch(`${BASE_URL}/subscriptions/user/templates`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("Cannot load templates");
            }

            templates = await response.json();
            renderTemplates();

        } catch (error) {
            console.error(error);
            container.innerHTML = `<p>${t("serverError")}</p>`;
        }
    }

    function renderTemplates() {
        const container = document.getElementById("templatesContainer");
        const search = document.getElementById("searchInput").value.toLowerCase();

        const filtered = templates.filter(item => {
            const text = JSON.stringify(item).toLowerCase();
            return text.includes(search);
        });

        container.innerHTML = "";

        if (filtered.length === 0) {
            container.innerHTML = `<p>${t("noTemplates")}</p>`;
            return;
        }

        filtered.forEach(item => {
            const id = item.id || item.templateId;
            const name = item.name || item.title || "Template";
            const description = item.description || "No description";
            const price = item.price || item.basePrice || "N/A";
            const businessName = item.businessName || item.business?.name || "Business";
            const type = item.type || item.businessType || item.business?.type || "OTHER";

            container.innerHTML += `
                <div class="item">
                    <div>
                        <strong>${name}</strong><br>
                        <small>${description}</small><br>
                        <small>Business: ${businessName}</small><br>
                        <small>Price: ${price}</small><br>
                        <span class="badge">${type}</span>
                    </div>

                    <button onclick="createSubscription(${id})">
                        ${t("subscribe")}
                    </button>
                </div>
            `;
        });
    }

    async function createSubscription(templateId) {
        const userId = document.getElementById("userIdInput").value;

        if (!userId) {
            alert(currentLang === "en" ? "Enter User ID first" : "Спочатку введіть ID користувача");
            return;
        }

        localStorage.setItem("userId", userId);

        const body = {
            userId: Number(userId),
            templateId: Number(templateId)
        };

        try {
            const response = await fetch(`${BASE_URL}/subscriptions/user/create-subscription`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            if (response.ok) {
                alert(currentLang === "en" ? "Subscription created" : "Підписку створено");
                loadActiveSubscriptions();
            } else {
                const error = await response.text();
                alert(error);
            }

        } catch (error) {
            console.error(error);
            alert(t("serverError"));
        }
    }

    async function loadActiveSubscriptions() {
        const userId = document.getElementById("userIdInput").value;
        const container = document.getElementById("activeContainer");

        if (!userId) {
            alert(currentLang === "en" ? "Enter User ID" : "Введіть ID користувача");
            return;
        }

        localStorage.setItem("userId", userId);
        container.innerHTML = "Loading...";

        try {
            const response = await fetch(`${BASE_URL}/subscriptions/user/${userId}/active`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("Cannot load active subscriptions");
            }

            const data = await response.json();

            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<p>${t("noActive")}</p>`;
                return;
            }

            data.forEach(item => {
                const id = item.id || item.userSubscriptionId;
                const name = item.name || item.templateName || "Subscription";
                const status = item.status || "ACTIVE";
                const startDate = item.startDate || "N/A";
                const endDate = item.endDate || "N/A";

                container.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>${name}</strong><br>
                            <small>Status: ${status}</small><br>
                            <small>Start: ${startDate}</small><br>
                            <small>End: ${endDate}</small>
                        </div>

                        <button onclick="loadSubscriptionStatus(${id})">
                            ${t("statusButton")}
                        </button>
                    </div>
                `;
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = `<p>${t("serverError")}</p>`;
        }
    }

    async function loadSubscriptionStatus(userSubscriptionId) {
        try {
            const response = await fetch(`${BASE_URL}/subscriptions/user/status/${userSubscriptionId}`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("Cannot load status");
            }

            const data = await response.json();

            alert(JSON.stringify(data, null, 2));

        } catch (error) {
            console.error(error);
            alert(t("serverError"));
        }
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
