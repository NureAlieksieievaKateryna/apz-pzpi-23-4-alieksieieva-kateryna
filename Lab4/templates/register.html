<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Page</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #a8edea, #d0f4de, #e0d4f7);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login__container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            width: 720px;
            border-radius: 15px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .login__swapper {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #05445E;
            font-size: 1.1rem;
            text-align: center;
            padding: 20px;
        }

        .login__area {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 10px;
        }

        .login__data {
            text-align: center;
            margin-bottom: 1rem;
            color: #05445E;
        }

        .login__title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login__description {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .role__buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role__button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 2px solid #05445E;
            background: white;
            color: #05445E;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .role__button.active {
            background: #05445E;
            color: white;
        }

        .login__form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login_box {
            position: relative;
        }

        .login__input {
            width: 86%;
            padding: 0.75rem 2.5rem 0.75rem 0.75rem;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .login_box i {
            position: absolute;
            right: 15px;
            top: 12px;
            color: #05445E;
        }

        .login_button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            background-color: #05445E;
            color: white;
            transition: 0.3s;
        }

        .login_button:hover {
            background-color: #189AB4;
        }

        .login__switch {
            text-align: center;
            margin-top: 1rem;
        }

        .login__switch a {
            text-decoration: none;
            color: #189AB4;
        }

        .login__switch a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 760px) {

            .login__container {
                grid-template-columns: 1fr;
                width: 92%;
            }

            .login__swapper {
                min-height: 120px;
            }

            .login__input {
                width: 82%;
            }
        }

    </style>

</head>

<body>

<div class="login__container">

    <div class="login__swapper">

        <div>
            <i class="ri-user-add-line" style="font-size: 3rem;"></i>

            <p id="sideText">
                Create your account and start using FlexiSubs.
            </p>
        </div>

    </div>

    <div class="login__area">

        <div class="login__data">

            <h1 class="login__title">
                Registration
            </h1>

            <p class="login__description">
                Choose account type and enter your details
            </p>

        </div>

        <div class="role__buttons">

            <button type="button"
                    class="role__button active"
                    id="clientBtn">

                Client

            </button>

            <button type="button"
                    class="role__button"
                    id="businessBtn">

                Business

            </button>

        </div>

        <form class="login__form" id="registerForm">

            <!-- USER -->

            <div id="clientFields">

                <div class="login_box">

                    <input type="text"
                           name="userLogin"
                           placeholder="Login"
                           class="login__input"
                           required>

                    <i class="ri-user-line"></i>

                </div>

                <div class="login_box">

                    <input type="text"
                           name="userName"
                           placeholder="Name"
                           class="login__input"
                           required>

                    <i class="ri-id-card-line"></i>

                </div>

            </div>

            <!-- BUSINESS -->

            <div id="businessFields" class="hidden">

                <div class="login_box">

                    <input type="text"
                           name="businessName"
                           placeholder="Business Name"
                           class="login__input">

                    <i class="ri-building-line"></i>

                </div>

                <div class="login_box">

                    <input type="text"
                           name="businessLogin"
                           placeholder="Business Login"
                           class="login__input">

                    <i class="ri-user-star-line"></i>

                </div>

                <div class="login_box">

                    <input type="text"
                           name="businessDescription"
                           placeholder="Description"
                           class="login__input">

                    <i class="ri-file-text-line"></i>

                </div>

                <div class="login_box">

                    <select name="businessType"
                            class="login__input"
                            required>

                        <option value="">Select Business Type</option>

                        <option value="CAFE">Cafe</option>

                        <option value="RESTAURANT">Restaurant</option>

                        <option value="GYM">Gym</option>

                        <option value="FITNESS_STUDIO">Fitness Studio</option>

                        <option value="BEAUTY_SALON">Beauty Salon</option>

                        <option value="BARBERSHOP">Barbershop</option>

                        <option value="SPA">Spa</option>

                        <option value="MEDICAL_CLINIC">Medical Clinic</option>

                        <option value="DENTAL_CLINIC">Dental Clinic</option>

                        <option value="ONLINE_SCHOOL">Online School</option>

                        <option value="LANGUAGE_SCHOOL">Language School</option>

                        <option value="MOBILE_OPERATOR">Mobile Operator</option>

                        <option value="INTERNET_PROVIDER">Internet Provider</option>

                        <option value="STREAMING_SERVICE">Streaming Service</option>

                        <option value="SOFTWARE_SERVICE">Software Service</option>

                        <option value="DELIVERY_SERVICE">Delivery Service</option>

                        <option value="STORE">Store</option>

                        <option value="OTHER">Other</option>

                    </select>

                    <i class="ri-briefcase-line"></i>

                </div>

            </div>

            <!-- COMMON -->

            <div class="login_box">

                <input type="email"
                       name="email"
                       placeholder="Email"
                       required
                       class="login__input">

                <i class="ri-mail-line"></i>

            </div>

            <div class="login_box">

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required
                       class="login__input">

                <i class="ri-lock-line"></i>

            </div>

            <button type="submit" class="login_button">

                Register

            </button>

        </form>

        <p class="login__switch">

            Already have an account?

            <a href="login.html">

                Log in

            </a>

        </p>

    </div>

</div>

<script>

    let selectedRole = "USER";

    const clientBtn = document.getElementById("clientBtn");
    const businessBtn = document.getElementById("businessBtn");

    const clientFields = document.getElementById("clientFields");
    const businessFields = document.getElementById("businessFields");

    const sideText = document.getElementById("sideText");

    clientBtn.addEventListener("click", () => {
        selectedRole = "USER";

        clientBtn.classList.add("active");
        businessBtn.classList.remove("active");

        clientFields.classList.remove("hidden");
        businessFields.classList.add("hidden");

        document.querySelectorAll("#clientFields input").forEach(input => {
            input.required = true;
        });

        document.querySelectorAll("#businessFields input, #businessFields select").forEach(input => {
            input.required = false;
        });

        sideText.innerText =
            "Create a client account and manage your subscriptions.";
    });

    businessBtn.addEventListener("click", () => {
        selectedRole = "BUSINESS";

        businessBtn.classList.add("active");
        clientBtn.classList.remove("active");

        businessFields.classList.remove("hidden");
        clientFields.classList.add("hidden");

        document.querySelectorAll("#businessFields input, #businessFields select").forEach(input => {
            input.required = true;
        });

        document.querySelectorAll("#clientFields input").forEach(input => {
            input.required = false;
        });

        sideText.innerText =
            "Create a business account and manage your subscription offers.";
    });

    document.querySelectorAll("#businessFields input, #businessFields select").forEach(input => {
        input.required = false;
    });

    document.getElementById("registerForm")
        .addEventListener("submit", async function (e) {

            e.preventDefault();

            const form = e.target;

            let body;
            let url;

            if (selectedRole === "USER") {

                body = {
                    login: form.userLogin.value,
                    name: form.userName.value,
                    email: form.email.value,
                    password: form.password.value
                };

                url = "http://localhost:8080/client/register";

            } else {

                body = {
                    name: form.businessName.value,
                    login: form.businessLogin.value,
                    description: form.businessDescription.value,
                    email: form.email.value,
                    type: form.businessType.value,
                    password: form.password.value
                };

                url = "http://localhost:8080/business/register";
            }

            try {

                const response = await fetch(url, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(body)

                });

                if (response.ok) {

                    alert("✅ Registration successful");

                    window.location.href = "user_home.html";

                } else {

                    const error = await response.text();

                    alert("❌ Registration failed: " + error);

                }

            } catch (error) {

                console.error(error);

                alert("⚠️ Server unavailable");

            }

        });

</script>

</body>
</html>
